spring.application.name=backend-test

spring.datasource.url=jdbc:mysql://localhost:3307/crm_test_db
spring.datasource.username=crm_user
spring.datasource.password=crm_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

jwt.secret=test-secret-for-crm-backend-tests-must-be-long-enough-1234567890
jwt.expiration-ms=3600000

app.cors.allowed-origins=http://localhost:5173

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
# Test email config
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# Test sender configuration
app.email.enabled=false
app.email.from-address=no-reply@test.local
app.email.from-name=Tadamun Test
app.email.reply-to=support@test.local

app.frontend.base-url=http://localhost:5173
